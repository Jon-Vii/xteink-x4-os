# Walk every Settings row with the change key: orientation, refresh
# policy, type size, and line spacing each advance one step, then Back
# returns home.

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Back"

[expect]
view = "Home"
selection = 0
orientation = "LandscapeButtonsTop"
refresh_policy = "FullEveryTen"
font_size = "Large"
line_spacing = "Relaxed"
last_refresh = "FastClean"
